
<div class="flex-1 overflow-y-auto p-4 w-full">
    <form (ngSubmit)="onSubmit()" [formGroup]="form" class="w-full flex flex-col gap-4">
        <div class="flex justify-center w-full gap-4">
            <label class="flex flex-col gap-2 md:w-[40%]">
                <span class="text-sm font-medium text-slate-700">Muscle Group <span class="text-red-600">*</span></span>
                <div class="flex items-center gap-4 justify-between shadow-md bg-linear-to-br from-white to-slate-50 rounded-lg px-4 py-4 transition-colors duration-200 border focus-within:outline outline-amber-400"
                [class.border-red-500]="!isControlValid('muscleGroupId', form)"
                [class.border-transparent]="isControlValid('muscleGroupId', form)">
                <div class="flex justify-center">
                    <ng-icon name="faSolidFilter" class="text-emerald-700! text-xl"></ng-icon>
                </div>
                <select
                formControlName="muscleGroupId"
                class="flex-1 bg-transparent outline-none text-lg font-semibold appearance-none">
                @for (muscleGroup of muscleGroups()!; track muscleGroup.id) {
                    <option [ngValue]="muscleGroup.id">{{muscleGroup.name}}</option>
                }
            </select>
        </div>
    </label>

    <label class="flex flex-col gap-2 md:w-[40%]">
        <span class="text-sm font-medium text-slate-700">Exercise Category <span class="text-red-600">*</span></span>
        <div class="flex items-center gap-4 justify-between shadow-md bg-linear-to-br from-white to-slate-50 rounded-lg px-4 py-4 transition-colors duration-200 border focus-within:outline outline-amber-400"
        [class.border-red-500]="!isControlValid('exerciseCategoryId', form)"
        [class.border-transparent]="isControlValid('exerciseCategoryId', form)">
        <div class="flex justify-center">
            <ng-icon name="faSolidFilter" class="text-emerald-700! text-xl"></ng-icon>
        </div>
        <select formControlName="exerciseCategoryId" class="flex-1 bg-transparent outline-none text-lg font-semibold appearance-none">

            @for (category of exerciseCategories()!; track category.id) {
                <option [ngValue]="category.id">{{category.name}}</option>
            }
        </select>
    </div>
</label>
</div>

<label class="flex flex-col gap-2 md:w-[50%] mx-auto">
    <span class="text-sm font-medium text-slate-700">Exercise name <span class="text-red-600">*</span></span>
    <div class="flex items-center gap-4 justify-between shadow-md bg-linear-to-br from-white to-slate-50 rounded-lg px-4 py-4 transition-colors duration-200 border focus-within:outline outline-amber-400"
    [class.border-red-500]="!isControlValid('exerciseName', form)"
    [class.border-transparent]="isControlValid('exerciseName', form)">
    <div class="flex justify-center">
        <ng-icon name="faSolidTag" class="text-emerald-700! text-xl"></ng-icon>
    </div>
    <input formControlName="exerciseName" class="flex-1 bg-transparent outline-none text-lg" type="text" placeholder="Enter exercise name...">
</div>
</label>

<div class="flex flex-col w-full items-center">

</div>

<app-button
class="mx-auto"
label="Save Changes" buttonSize="sm" [buttonType]="'primary'" [htmlType]="'submit'"></app-button>

</form>
</div>
