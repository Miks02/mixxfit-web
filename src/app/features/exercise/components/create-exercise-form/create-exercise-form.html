<div class="flex-1 overflow-y-auto p-4 w-full flex justify-center">
    <form
    (ngSubmit)="onSubmit()"
    [formGroup]="form"
    class="w-full max-w-5xl min-h-full flex flex-col"
    >
    <div class="w-full flex flex-col md:flex-row md:flex-wrap gap-4 justify-center">

        <label class="flex flex-col gap-2 w-full md:w-[40%]">
            <span class="text-sm font-medium text-slate-700">Muscle Group <span class="text-red-600">*</span></span>
            @if(!muscleGroups()) {
                <ngx-skeleton-loader
                count="1"
                [theme]="{
                    'height': '60px',
                    'border-radius': '12px',
                    'background': '#cbd5e199',
                }"
                class="w-full"
                appearance="line">
            </ngx-skeleton-loader>
        }
        @else {
            <div
            class="flex items-center gap-4 justify-between shadow-md bg-linear-to-br from-white to-slate-50 rounded-lg px-4 py-4 transition-colors duration-200 border focus-within:outline outline-amber-400"
            [class.border-red-500]="!isControlValid('muscleGroupId', form)"
            [class.border-transparent]="isControlValid('muscleGroupId', form)"
            >
            <div class="flex justify-center">
                <ng-icon name="faSolidFilter" class="text-emerald-700! text-xl"></ng-icon>
            </div>
            <select
            formControlName="muscleGroupId"
            class="flex-1 bg-transparent outline-none text-lg font-semibold appearance-none {{!form.get('muscleGroupId')?.value ? 'text-slate-700 font-normal!' : 'text-slate-800'}}"
            >
            <option [ngValue]="null" disabled hidden >Select Muscle Group</option>
            @for (muscleGroup of muscleGroups()!; track muscleGroup.id) {
                <option [ngValue]="muscleGroup.id">{{muscleGroup.name}}</option>
            }

        </select>
    </div>
}

</label>

<label class="flex flex-col gap-2 w-full md:w-[40%]">

    <span class="text-sm font-medium text-slate-700">Exercise Category <span class="text-red-600">*</span></span>
    @if(!exerciseCategories()) {
        <ngx-skeleton-loader
        count="1"
        [theme]="{
            'height': '60px',
            'border-radius': '12px',
            'background': '#cbd5e199',
        }"
        class="w-full"
        appearance="line">
    </ngx-skeleton-loader>
}
@else {
    <div
    class="flex items-center gap-4 justify-between shadow-md bg-linear-to-br from-white to-slate-50 rounded-lg px-4 py-4 transition-colors duration-200 border focus-within:outline outline-amber-400"
    [class.border-red-500]="!isControlValid('categoryId', form)"
    [class.border-transparent]="isControlValid('categoryId', form)"
    >
    <div class="flex justify-center">
        <ng-icon name="faSolidFilter" class="text-emerald-700! text-xl"></ng-icon>
    </div>
    <select
    formControlName="categoryId"
    class="flex-1 bg-transparent outline-none text-lg font-semibold appearance-none {{!form.get('categoryId')?.value ? 'text-slate-700 font-normal!' : 'text-slate-800'}}"
    >
    <option [ngValue]="null" disabled hidden>Select Category</option>
    @for (category of exerciseCategories()!; track category.id) {
        <option [ngValue]="category.id">{{category.name}}</option>
    }
</select>
</div>
}

</label>

<label class="flex flex-col gap-2 w-full md:w-[50%] md:mx-auto">
    <span class="text-sm font-medium text-slate-700">Exercise name <span class="text-red-600">*</span></span>
    <div
    class="flex items-center gap-4 justify-between shadow-md bg-linear-to-br from-white to-slate-50 rounded-lg px-4 py-4 transition-colors duration-200 border focus-within:outline outline-amber-400"
    [class.border-red-500]="!isControlValid('name', form)"
    [class.border-transparent]="isControlValid('name', form)"
    >
    <div class="flex justify-center">
        <ng-icon name="faSolidTag" class="text-emerald-700! text-xl"></ng-icon>
    </div>
    <input
    formControlName="name"
    class="flex-1 text-slate-800 font-semibold bg-transparent outline-none text-lg"
    type="text"
    placeholder="Enter exercise name..."
    >
</div>
</label>
</div>

<div class="w-full mt-10 pt-6 border-t border-slate-200 flex items-center flex-col gap-3">
    <p class="text-sm font-medium text-slate-700">Preview</p>

    <div class="flex flex-col w-full items-center justify-center">
        <div class="flex w-full md:w-[80%] items-center bg-slate-300 rounded-xl px-4 py-3.5 hover:bg-amber-300/70 transition-all duration-200 cursor-pointer group shadow-md active:bg-amber-300 active:scale-[0.99]">
            <div
            [class.from-yellow-400]="getExerciseType() === 1"
            [class.to-amber-500]="getExerciseType() === 1"
            [class.from-indigo-400]="getExerciseType() === 2"
            [class.to-indigo-600]="getExerciseType() === 2"
            [class.from-red-400]="getExerciseType() === 3"
            [class.to-rose-500]="getExerciseType() === 3"
            [class.from-violet-400]="getExerciseType() === 4"
            [class.to-violet-500]="getExerciseType() === 4"
            class="bg-linear-to-br w-11 h-11 rounded-xl shadow-lg flex items-center justify-center mr-4 shrink-0 group-hover:scale-110 transition-transform duration-200"
            >
            @switch(getExerciseType()) {
                @case(4) { <ng-icon name="faSolidPersonWalkingArrowLoopLeft" class="text-white! text-lg"></ng-icon> }
                @case(3) { <ng-icon name="faSolidPersonRunning" class="text-white! text-lg"></ng-icon> }
                @case(2) { <ng-icon name="faSolidChildReaching" class="text-white! text-lg"></ng-icon> }
                @default { <ng-icon name="faSolidDumbbell" class="text-white! text-lg"></ng-icon> }
            }
        </div>

        <div class="flex flex-col flex-1 min-w-0">
            <p class="font-semibold text-slate-900 truncate">{{ form.get("name")?.value }} {{ getExerciseCategoryName() }}</p>
            <p class="text-xs text-slate-600 font-medium truncate mt-0.5">{{ getMuscleGroupName() }}</p>
        </div>
    </div>
</div>
</div>

<div class="mt-15 pb-2 flex justify-center">
    <app-button
    label="Save Changes"
    buttonSize="sm"
    [buttonType]="'primary'"
    [htmlType]="'submit'"
    [isLoading]="isLoading()"
    [disabled]="!form.valid || isLoading()"
    ></app-button>
</div>
</form>
</div>
