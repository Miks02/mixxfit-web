<div class="fixed inset-0 z-150 w-full h-dvh bg-slate-700/40 backdrop-blur-2xl" (click)="onClose()"></div>

<div class="fixed inset-0 z-160 flex items-center justify-center p-0 sm:p-4 lg:p-6 pointer-events-none">
    <div class="pointer-events-auto bg-slate-200 w-full md:w-200 h-dvh  sm:max-h-[90dvh] flex flex-col overflow-hidden sm:rounded-2xl shadow-2xl">

        <div class="flex-none flex pt-[env(safe-area-inset-top)] justify-between items-center px-4 bg-linear-to-br from-yellow-500 to-yellow-400 sm:rounded-t-2xl min-h-12 sticky top-0">
            <div class="flex items-center gap-2">
                <ng-icon name="faSolidDumbbell" class="text-xl text-slate-800!"></ng-icon>
                <h1 class="text-xl font-bold text-slate-800">{{config()?.title}}</h1>
            </div>

            <div class="flex items-center gap-0.5">
                @for (modalAction of config()?.action; track $index) {
                    <button (click)="modalAction.action.set(!modalAction.action())"
                    class="flex items-center justify-center cursor-pointer p-2 rounded-lg hover:bg-yellow-600/30 active:opacity-70 transition-colors"
                    [class.bg-yellow-700/25]="modalAction.action()"
                    [class.text-yellow-900]="modalAction.action()"
                    [class.text-slate-800]="!modalAction.action()">
                    <ng-icon [name]="modalAction.icon" class="text-xl"></ng-icon>
                </button>
            }

            @if(config()?.showBackButton) {
                <button (click)="onBack()" class="flex items-center justify-center cursor-pointer p-2 rounded-lg text-blue-800 hover:bg-yellow-600/30 active:opacity-70 transition-colors">
                    <ng-icon name="faSolidLeftLong" class="text-xl"></ng-icon>
                </button>
            }

            <button (click)="onClose()" class="flex items-center justify-center cursor-pointer p-2 rounded-lg text-red-700 hover:bg-yellow-600/30 active:opacity-70 transition-colors">
                <ng-icon name="faSolidXmark" class="text-xl mt-px"></ng-icon>
            </button>
        </div>
    </div>

    <div class="overflow-y-auto">
        <router-outlet></router-outlet>
    </div>


</div>
