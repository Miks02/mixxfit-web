<div class="flex flex-col lg:flex-row gap-6 items-start">
    <div class="w-full lg:w-2/3 bg-slate-200 rounded-3xl shadow-xl overflow-hidden">
        <div class="bg-linear-to-r from-amber-500 to-amber-400 px-4 py-2">
            <h2 class="text-xl font-bold text-slate-800 tracking-tight">Workout Details</h2>
        </div>

        <div class="px-8 pb-8 pt-6 space-y-8">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                @for(item of [1, 2]; track $index) {
                    <div class="flex flex-col gap-3">
                        <ngx-skeleton-loader
                        appearance="line"
                        [theme]="{
                            'height': '12px',
                            'width': '120px',
                            'margin-bottom': '0.25rem',
                            'border-radius': '6px',
                            'background': '#94a3b866'
                        }">
                    </ngx-skeleton-loader>
                    <div class="flex items-center gap-4 rounded-xl px-5 py-4 border border-slate-200 bg-linear-to-br from-slate-50 to-slate-100">
                        <ngx-skeleton-loader
                        appearance="circle"
                        [theme]="{
                            'width': '32px',
                            'height': '32px',
                            'background': '#cbd5e1'
                        }">
                    </ngx-skeleton-loader>
                    <ngx-skeleton-loader
                    appearance="line"
                    [theme]="{
                        'height': '18px',
                        'width': 'min(100%, 320px)',
                        'border-radius': '8px',
                        'background': '#cbd5e1'
                    }">
                </ngx-skeleton-loader>
            </div>
        </div>
    }
</div>

<div class="border-t border-slate-200 space-y-5 pt-5">
    <div class="flex items-center justify-between gap-3">
        <ngx-skeleton-loader
        appearance="line"
        [theme]="{
            'height': '28px',
            'width': '170px',
            'border-radius': '8px',
            'background': '#cbd5e1'
        }">
    </ngx-skeleton-loader>
    <ngx-skeleton-loader
    appearance="line"
    [theme]="{
        'height': '30px',
        'width': '84px',
        'border-radius': '999px',
        'background': '#fde68a'
    }">
</ngx-skeleton-loader>
</div>

<div class="space-y-4 max-h-78 overflow-y-auto pr-2 custom-scrollbar">
    <div class="space-y-3">
        <div class="rounded-2xl p-5 border border-slate-200 bg-linear-to-br from-white to-slate-50">
            <div class="flex items-center justify-between gap-3">
                <div class="flex items-center gap-4 flex-1 min-w-0">
                    <ngx-skeleton-loader
                    appearance="line"
                    [theme]="{
                        'height': '48px',
                        'width': '48px',
                        'border-radius': '12px',
                        'background': '#fcd34d'
                    }">
                </ngx-skeleton-loader>
                <div class="flex-1 min-w-0">
                    <ngx-skeleton-loader
                    appearance="line"
                    [theme]="{
                        'height': '18px',
                        'width': 'min(100%, 220px)',
                        'border-radius': '8px',
                        'background': '#cbd5e1'
                    }">
                </ngx-skeleton-loader>
                <ngx-skeleton-loader
                appearance="line"
                [theme]="{
                    'height': '12px',
                    'width': '92px',
                    'border-radius': '8px',
                    'background': '#94a3b866',
                    'margin-top': '0.35rem'
                }">
            </ngx-skeleton-loader>
        </div>
    </div>
    <ngx-skeleton-loader
    appearance="line"
    [theme]="{
        'height': '36px',
        'width': '72px',
        'border-radius': '10px',
        'background': '#e2e8f0'
    }">
</ngx-skeleton-loader>
</div>
<div class="flex flex-wrap gap-2">
    @for(set of [1, 2, 3]; track $index) {
        <ngx-skeleton-loader
        appearance="line"
        [theme]="{
            'height': '38px',
            'width': '170px',
            'border-radius': '12px',
            'background': '#f8fafc',
            'border': '2px solid #fde68a'
        }">
    </ngx-skeleton-loader>
}
</div>
</div>


</div>

</div>
</div>



<div class="flex justify-center pt-2">
    <ngx-skeleton-loader
    appearance="line"
    [theme]="{
        'height': '42px',
        'width': '170px',
        'border-radius': '10px',
        'background': '#fca5a5'
    }">
</ngx-skeleton-loader>
</div>
</div>
</div>

<div class="w-full lg:w-1/3 space-y-6">
    <aside class="bg-white rounded-3xl shadow-xl overflow-hidden">
        <div class="bg-linear-to-r from-amber-500 to-amber-400 px-4 py-2">
            <h3 class="text-xl font-bold text-slate-800 tracking-tight">Summary</h3>
        </div>

        <div class="px-6 pb-6 pt-6 space-y-5">
            <div class="grid grid-cols-2 gap-4">
                @for(item of [1, 2]; track $index) {
                    <div class="rounded-2xl shadow-md p-4 bg-slate-100">
                        <ngx-skeleton-loader
                        appearance="line"
                        [theme]="{
                            'height': '10px',
                            'width': '80px',
                            'border-radius': '8px',
                            'background': '#94a3b866'
                        }">
                    </ngx-skeleton-loader>
                    <ngx-skeleton-loader
                    appearance="line"
                    [theme]="{
                        'height': '34px',
                        'width': '54px',
                        'border-radius': '8px',
                        'background': '#cbd5e1',
                        'margin-top': '0.35rem'
                    }">
                </ngx-skeleton-loader>
            </div>
        }
    </div>

    <div class="rounded-2xl shadow-md p-5 bg-linear-to-br from-slate-50 to-slate-100">
        <ngx-skeleton-loader
        count="2"
        appearance="line"
        [theme]="{
            'height': '16px',
            'width': '100%',
            'border-radius': '8px',
            'background': '#cbd5e1'
        }">
    </ngx-skeleton-loader>
</div>

<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-6 gap-4">
  @for(item of [1, 2, 3, 4, 5]; track $index) {
    <div
      class="flex items-center gap-4 rounded-2xl shadow-md px-4 py-4 bg-slate-100"
      [class.lg:col-span-2]="$index < 3"
      [class.lg:col-span-3]="$index >= 3">

      <ngx-skeleton-loader
        appearance="line"
        [theme]="{
            'height': '48px',
            'width': '48px',
            'border-radius': '12px',
            'background': '#cbd5e1',
            'margin': '0'
        }">
      </ngx-skeleton-loader>

      </div>
  }
</div>
</div>
</aside>
</div>
</div>
